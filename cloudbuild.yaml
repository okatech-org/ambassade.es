# ─────────────────────────────────────────────────
# Cloud Build configuration
# Builds Docker image and deploys to Cloud Run
# ─────────────────────────────────────────────────
steps:
  # Step 1 — Build the Docker image with build-time ARGs
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_CONVEX_URL=${_VITE_CONVEX_URL}'
      - '--build-arg'
      - 'VITE_CLERK_PUBLISHABLE_KEY=${_VITE_CLERK_PUBLISHABLE_KEY}'
      - '--build-arg'
      - 'CLERK_SECRET_KEY=${_CLERK_SECRET_KEY}'
      - '--build-arg'
      - 'CONVEX_DEPLOYMENT=${_CONVEX_DEPLOYMENT}'
      - '--build-arg'
      - 'VITE_SENTRY_DSN=${_VITE_SENTRY_DSN}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/france-consulat-ga:latest'
      - '.'

  # Step 2 — Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/france-consulat-ga:latest'

  # Step 3 — Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'france-consulat-ga'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/france-consulat-ga:latest'
      - '--platform'
      - 'managed'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--set-env-vars'
      - 'VITE_CONVEX_URL=${_VITE_CONVEX_URL},VITE_CLERK_PUBLISHABLE_KEY=${_VITE_CLERK_PUBLISHABLE_KEY},CLERK_SECRET_KEY=${_CLERK_SECRET_KEY},CONVEX_DEPLOYMENT=${_CONVEX_DEPLOYMENT},VITE_SENTRY_DSN=${_VITE_SENTRY_DSN},NODE_ENV=production'

# Substitution variables (passed via --substitutions flag)
substitutions:
  _VITE_CONVEX_URL: ''
  _VITE_CLERK_PUBLISHABLE_KEY: ''
  _CLERK_SECRET_KEY: ''
  _CONVEX_DEPLOYMENT: ''
  _VITE_SENTRY_DSN: ''

images:
  - 'gcr.io/${PROJECT_ID}/france-consulat-ga:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
